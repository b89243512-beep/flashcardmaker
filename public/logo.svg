<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="100" fill="url(#bg)"/>
  <!-- Stacked cards -->
  <rect x="130" y="160" width="240" height="160" rx="16" fill="white" opacity="0.3" transform="rotate(-6 250 240)"/>
  <rect x="130" y="160" width="240" height="160" rx="16" fill="white" opacity="0.6" transform="rotate(-2 250 240)"/>
  <rect x="130" y="160" width="240" height="160" rx="16" fill="white" transform="rotate(2 250 240)"/>
  <!-- Lightning bolt -->
  <path d="M260 200 L240 245 H265 L245 290" stroke="#f97316" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Sparkle -->
  <g transform="translate(310, 185)" fill="#f97316" opacity="0.8">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z"/>
  </g>
  <!-- Text: AI -->
  <text x="250" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="72" fill="white">AI</text>
</svg>
